name: Daily Sweeps Update
on:
  schedule:
    - cron: '0 13 * * *' # Runs every day at 1 PM UTC (8 AM EST)
  workflow_dispatch:      # Lets you click a button to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install requests beautifulsoup4

      - name: Run My Scraper
        run: python myscraper.py

      - name: Save Changes
        run: |
          git config --global user.name 'SweepstakesBot'
          git config --global user.email 'bot@mysweepstakeshub.com'
          git add .
          git commit -m "Automated update" || exit 0
          git push
