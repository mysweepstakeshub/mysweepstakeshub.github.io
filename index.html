<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sweepstakes Hub | Daily Giveaways</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .featured-item { border-left: 4px solid #fbbf24; background: #fffdf5; }
        .directory-card { border: 1px solid #e5e7eb; transition: transform 0.2s; }
        .directory-card:hover { transform: translateY(-2px); border-color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

<header class="bg-slate-900 text-white py-6 shadow-md">
    <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
        <h1 class="text-4xl text-blue-400 logo-font tracking-normal">MySweepstakesHub</h1>
        <span class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase text-[10px]">Updated April 2026</span>
    </div>
</header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <section class="mb-12">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4 flex items-center">
                <i class="fas fa-star text-yellow-500 mr-2"></i> Editor's Top 5 Picks
            </h2>
            <div id="featured-container" class="space-y-3">
                </div>
        </section>

        <section>
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-6 flex items-center">
                <i class="fas fa-list-ul text-blue-500 mr-2"></i> Full Giveaway Directory
            </h2>
            <div id="directory-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </section>
    </main>

    <script>
        async function loadSites() {
            try {
                const response = await fetch('sites_db.json');
                const sites = await response.json();
                const fContainer = document.getElementById('featured-container');
                const dContainer = document.getElementById('directory-container');

                sites.forEach(site => {
                    if (site.featured) {
                        // Sleek, horizontal featured row
                        fContainer.innerHTML += `
                            <div class="featured-item p-4 rounded-r-lg shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
                                <div>
                                    <h3 class="font-bold text-slate-800">${site.name}</h3>
                                    <p class="text-xs text-slate-500">${site.description}</p>
                                </div>
                                <a href="${site.url}" target="_blank" class="bg-slate-800 text-white px-6 py-2 rounded text-xs font-bold hover:bg-slate-700 transition">ENTER NOW</a>
                            </div>`;
                    } else {
                        // Clean, professional directory card
                        dContainer.innerHTML += `
                            <div class="directory-card bg-white p-5 rounded-lg shadow-sm flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between items-start mb-2">
                                        <h3 class="font-bold text-slate-900 leading-tight">${site.name}</h3>
                                        <span class="text-xs font-bold text-blue-600">${site.rating}★</span>
                                    </div>
                                    <p class="text-xs text-slate-500 mb-4 line-clamp-2">${site.description}</p>
                                </div>
                                <a href="${site.url}" target="_blank" class="text-center py-2 border border-slate-200 rounded text-xs font-bold text-slate-700 hover:bg-slate-50 transition">VIEW SITE</a>
                            </div>`;
                    }
                });
            } catch (e) { console.error(e); }
        }
        loadSites();
    </script>

</body>
</html>
