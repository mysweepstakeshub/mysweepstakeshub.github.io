<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sweepstakes Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .logo-font { font-family: 'Pacifico', cursive; }
        .featured-item { border-left: 4px solid #fbbf24; background: #fffdf5; }
        .directory-card { border: 1px solid #e5e7eb; transition: 0.2s; }
        .directory-card:hover { transform: translateY(-2px); border-color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-slate-900 text-white py-6 shadow-md">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-4xl text-blue-400 logo-font">MySweepstakesHub</h1>
            <span class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase">Live 2026</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <section class="mb-12">
            <h2 class="text-sm font-bold text-slate-400 uppercase mb-4 tracking-widest">Editor's Picks</h2>
            <div id="featured-container" class="space-y-3"></div>
        </section>

        <section>
            <h2 class="text-sm font-bold text-slate-400 uppercase mb-4 tracking-widest">Full Directory</h2>
            <div id="directory-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>
    </main>

    <script>
        async function loadSites() {
            const fContainer = document.getElementById('featured-container');
            const dContainer = document.getElementById('directory-container');
            try {
                const response = await fetch('sites_db.json');
                const sites = await response.json();
                sites.forEach(site => {
                    const cardHtml = site.featured ? 
                        `<div class="featured-item p-4 rounded-r-lg shadow-sm flex justify-between items-center">
                            <h3 class="font-bold text-slate-800">${site.name}</h3>
                            <a href="${site.url}" target="_blank" class="bg-slate-800 text-white px-6 py-2 rounded text-xs font-bold uppercase">Enter Now</a>
                        </div>` :
                        `<div class="directory-card bg-white p-5 rounded-lg shadow-sm flex flex-col justify-between">
                            <h3 class="font-bold text-slate-900 mb-2">${site.name}</h3>
                            <p class="text-xs text-slate-500 mb-4">${site.description}</p>
                            <a href="${site.url}" target="_blank" class="text-center py-2 border border-slate-200 rounded text-xs font-bold text-slate-700">VIEW SITE</a>
                        </div>`;
                    
                    if (site.featured) { fContainer.innerHTML += cardHtml; } 
                    else { dContainer.innerHTML += cardHtml; }
                });
            } catch (e) { console.error(e); }
        }
        loadSites();
    </script>
</body>
</html>
